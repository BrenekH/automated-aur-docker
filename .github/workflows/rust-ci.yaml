name: Build, Test, and Lint Rust Code

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        command:
          - "cargo build --verbose"
          - "cargo test --verbose"
          - "cargo clippy"

    defaults:
      run:
        working-directory: ./update-package-via-manifest

    steps:
    - uses: actions/checkout@v7

    - run: ${{ matrix.command }}
